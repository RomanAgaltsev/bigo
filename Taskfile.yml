version: "3"

tasks:
  metrics:
    desc: Regenerate the coverage golden (metrics/metrics.json + metrics/METRICS.md)
    cmds:
      - go test ./internal/metrics/ -run TestGolden -update

  survey:
    desc: Run the real-world survey over survey/targets.json (MANUAL — not a CI gate)
    cmds:
      - go test ./internal/survey/ -run TestSurvey -update -timeout 60m -v

  corpus:
    desc: Regenerate the canonical-corpus oracle golden (corpus/corpus.json + corpus/CORPUS.md)
    cmds:
      - go test ./internal/oracle/ -run TestGolden -update

  report-golden:
    desc: Regenerate the report schema golden (internal/report/testdata/golden/report.json)
    cmds:
      - go test ./internal/report/ -run TestGolden -update

  test:
    desc: Run all tests with the race detector
    cmds:
      - go test ./... -race
  cover:
    desc: Run tests with coverage
    cmds:
      - go test ./... -coverprofile=coverage.out
  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run
  lint:custom:
    desc: Build the custom golangci-lint (with the bigo plugin) and run bigo on this repo
    cmds:
      - golangci-lint custom
      - '{{if eq OS "windows"}}./bin/custom-gcl.exe{{else}}./bin/custom-gcl{{end}} run -c .golangci.custom.yml'
  tidy:
    desc: Tidy modules
    cmds:
      - go mod tidy
  ci:
    desc: Full local CI
    deps: [tidy, lint, test]

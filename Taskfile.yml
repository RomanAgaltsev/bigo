version: "3"

tasks:
  test:
    desc: Run all tests with the race detector
    cmds:
      - go test ./... -race
  cover:
    desc: Run tests with coverage
    cmds:
      - go test ./... -coverprofile=coverage.out
  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run
  tidy:
    desc: Tidy modules
    cmds:
      - go mod tidy
  ci:
    desc: Full local CI
    deps: [tidy, lint, test]

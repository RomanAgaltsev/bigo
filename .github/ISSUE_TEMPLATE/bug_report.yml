name: Bug report
description: Report a problem with bigo
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Include the Go code and the //bigo:max annotation that triggered it, plus the diagnostic bigo emitted (or failed to emit).
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproducer
      description: The smallest Go snippet (or link) that reproduces the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: bigo version
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: go1.26.0
    validations:
      required: true

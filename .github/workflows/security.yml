name: security
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC

permissions:
  contents: read

jobs:
  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read # required for CodeQL on repos that were private
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: github/codeql-action/init@v4
        with:
          languages: go
          config-file: ./.github/codeql/codeql-config.yml
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: securego/gosec@master
        with:
          # gosec walks the filesystem itself, so unlike the go tool it descends
          # into testdata. Those are analyzer fixtures, not shipped code, and
          # some intentionally do not compile.
          args: -exclude-dir=testdata ./...

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5

  actionlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

  security-success:
    if: always()
    needs: [codeql, govulncheck, gosec]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.codeql.result }}" != "success" ] || \
             [ "${{ needs.govulncheck.result }}" != "success" ] || \
             [ "${{ needs.gosec.result }}" != "success" ]; then
            echo "security checks failed"; exit 1
          fi

name: test
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.26.x", "stable"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - name: race tests + coverage
        run: go test -race -shuffle=on -covermode=atomic -coverprofile=coverage.out ./...
      - name: bigo json self-run smoke
        run: go run ./cmd/bigo json ./... > /dev/null
      - name: bigo badge self-run smoke
        run: go run ./cmd/bigo badge ./... > /dev/null
      - name: upload coverage
        if: matrix.go == 'stable'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: short fuzz smoke
        run: go test ./internal/annotation/ -run x -fuzz FuzzParse -fuzztime 20s

  test-success:
    if: always()
    needs: [test, fuzz-smoke]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.fuzz-smoke.result }}" != "success" ]; then
            echo "one or more test jobs failed"; exit 1
          fi

name: lint
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - name: format check
        # Because .custom-gcl.yml exists, golangci-lint-action builds the custom
        # binary and only puts that on PATH -- there is no `golangci-lint` to call.
        run: |
          ./bin/custom-gcl fmt ./...
          git diff --exit-code
      - name: tidy check
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: bigo on bigo
        run: ./bin/custom-gcl run -c .golangci.custom.yml

  lint-success:
    if: always()
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "lint failed"; exit 1
          fi

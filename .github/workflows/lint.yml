name: lint
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - name: format check
        run: |
          golangci-lint fmt ./...
          git diff --exit-code
      - name: tidy check
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  lint-success:
    if: always()
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "lint failed"; exit 1
          fi

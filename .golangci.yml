version: "2"
run:
  timeout: 5m
linters:
  default: standard
  enable:
    - revive
    - gocritic
    - misspell
    - bigo
  settings:
    custom:
      bigo:
        type: module
        description: Checks //bigo:max asymptotic complexity budgets.
formatters:
  enable:
    - gofmt
    - goimports
